name: Build JARVIS Firmware

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio requests

      - name: Build firmware
        run: platformio run -e seeed_xiao_esp32s3

      - name: Upload firmware (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: .pio/build/seeed_xiao_esp32s3/firmware.bin

      - name: Upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/upload_firmware.py
